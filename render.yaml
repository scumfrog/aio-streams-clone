services:
  - type: web
    name: aio-streams-clone
    env: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm@latest && pnpm install --frozen-lockfile && pnpm build
    startCommand: node packages/server/dist/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: aio-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: STREAM_CACHE_TTL
        value: "300"
      - key: MAX_ADDON_TIMEOUT
        value: "15000"
      - key: MAX_STREAMS_PER_ADDON
        value: "50"

databases:
  - name: aio-db
    databaseName: aiostreams
    plan: free
    region: oregon
